<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Image Explorer</title>
    <link rel="stylesheet" href="https://cdn.webix.com/edge/webix.css">
    <script src="https://cdn.webix.com/edge/webix.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exifreader@4.41.0/dist/exif-reader.js"></script>
    <link rel="stylesheet" href="app.css">
</head>
<body>
<div id="loadingScreen" class="loading-screen">
    <div class="loading-box">
        <div class="loading-title">Please wait, loading folder&hellip;</div>
        <div class="loading-stats">
            <div>Folder size: <span id="loadingSize">&mdash;</span></div>
            <div>Files count: <span id="loadingCount">&mdash;</span></div>
            <div>Cache date: <span id="loadingDate">&mdash;</span></div>
        </div>
        <div class="loading-progress-track">
            <div id="loadingProgressBar" class="loading-progress-bar"></div>
        </div>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
